<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nested Mental Bubbles</title>

<style>

:root{
  --green:#00ff88;
  --soft:#dcffee;
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#00ff88;
  font-family:monospace;
  touch-action:manipulation;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:500;
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,.03) 0px,
      rgba(255,255,255,.03) 1px,
      transparent 2px,
      transparent 4px
    );
  opacity:.12;
}

#bg{
  position:fixed;
  inset:0;
  z-index:1;
}

.title{
  position:fixed;
  top:16px;
  left:50%;
  transform:translateX(-50%);
  width:min(96vw,1100px);
  text-align:center;
  font-size:clamp(11px,1.8vw,18px);
  letter-spacing:.22em;
  text-transform:uppercase;
  color:#d7fff0;
  text-shadow:0 0 14px #00ff88;
  z-index:100;
}

.status{
  position:fixed;
  top:58px;
  left:50%;
  transform:translateX(-50%);
  opacity:.5;
  font-size:11px;
  letter-spacing:.16em;
  z-index:120;
}

.portal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}

#viz{
  width:min(760px,96vw);
  height:min(760px,96vw);
  border-radius:50%;
  background:
    radial-gradient(circle at center,
      rgba(0,45,18,.96),
      rgba(0,0,0,1));
  border:2px solid rgba(0,255,120,.38);
  box-shadow:
    inset 0 0 120px rgba(0,255,120,.06),
    inset 0 0 40px rgba(0,255,120,.08),
    0 0 40px rgba(0,255,120,.16);
  z-index:40;
}

.subs{
  position:fixed;
  bottom:58px;
  left:0;
  right:0;
  margin:auto;
  width:min(920px,94vw);
  padding:10px 16px;
  min-height:3em;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:clamp(13px,3.4vw,17px);
  line-height:1.5;
  color:#d9fff0;
  text-shadow:0 0 10px rgba(0,255,120,.8);
  background:rgba(0,16,0,.34);
  border:1px solid rgba(0,255,120,.18);
  border-radius:8px;
  pointer-events:none;
  z-index:70;
  transition:
    opacity .15s ease,
    transform .08s ease;
}

.essay{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  color:#9effd0;
  text-decoration:none;
  letter-spacing:.10em;
  font-size:11px;
  opacity:.72;
  z-index:90;
}

.essay:hover{
  opacity:1;
}

.glitch{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:300;
  opacity:0;
}

.glitch.active{
  animation:glitch .18s linear;
}

@keyframes glitch{

  0%{
    opacity:0;
    transform:translate(0,0);
    background:
      repeating-linear-gradient(
        90deg,
        rgba(255,255,255,.08) 0px,
        transparent 2px,
        transparent 5px
      );
  }

  25%{
    opacity:.28;
    transform:translate(-16px,5px);
  }

  55%{
    opacity:.20;
    transform:translate(18px,-4px);
  }

  100%{
    opacity:0;
    transform:translate(0,0);
  }
}

@media(max-width:700px){

  .subs{
    bottom:54px;
  }

  .status{
    font-size:9px;
  }
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="title">
  THE GEOMETRY OF NESTED MENTAL BUBBLES
</div>

<div class="status">
  TOUCH / CLICK ANYWHERE TO PLAY OR PAUSE
</div>

<div class="portal">
  <canvas id="viz"></canvas>
</div>

<div class="subs" id="subs"></div>

<a class="essay"
href="https://standardgalactic.github.io/spherepop/dynamics/spherepop_scope_dynamics.pdf"
target="_blank"
onclick="event.stopPropagation()">
RECURSIVE CONTAINMENT AND DEFERRED CLOSURE
</a>

<div class="glitch" id="glitch"></div>

<audio id="audio" preload="auto">
  <source src="The_Geometry_of_Nested_Mental_Bubbles.mp3">
</audio>

<script>

const audio =
  document.getElementById("audio")

const subs =
  document.getElementById("subs")

const glitch =
  document.getElementById("glitch")

let audioCtx
let analyser
let data

function initAudio(){

  if(audioCtx) return

  audioCtx =
    new (
      window.AudioContext ||
      window.webkitAudioContext
    )()

  analyser =
    audioCtx.createAnalyser()

  analyser.fftSize = 2048
  analyser.smoothingTimeConstant = 0.88

  const src =
    audioCtx.createMediaElementSource(audio)

  src.connect(analyser)
  analyser.connect(audioCtx.destination)

  data =
    new Uint8Array(
      analyser.frequencyBinCount
    )
}

document.body.onclick =
  async ()=>{

    initAudio()

    if(audioCtx.state==="suspended")
      await audioCtx.resume()

    if(audio.paused){

      audio.play()

    }else{

      audio.pause()
    }
  }

/* subtitles */

let cues = []

async function loadVTT(){

  try{

    const r =
      await fetch(
        "The_Geometry_of_Nested_Mental_Bubbles.vtt"
      )

    if(!r.ok){
      console.warn("Missing VTT")
      return
    }

    const txt =
      await r.text()

    cues =
      parseVTT(txt)

  }catch(e){

    console.warn(e)
  }
}

function parseVTT(txt){

  const lines =
    txt.split("\n")

  const out = []

  let i = 0

  while(i < lines.length){

    const line =
      lines[i].trim()

    if(line.includes("-->")){

      const [s,e] =
        line.split("-->")
            .map(v=>v.trim())

      i++

      const text = []

      while(
        i < lines.length &&
        lines[i].trim()
      ){

        text.push(
          lines[i].trim()
        )

        i++
      }

      out.push({

        start:toSec(s),
        end:toSec(e),
        text:text.join(" ")

      })

    }else{

      i++
    }
  }

  return out
}

function toSec(t){

  const p =
    t.replace(",",".")
     .split(":")

  if(p.length===3){

    return (
      (+p[0])*3600 +
      (+p[1])*60 +
      (+p[2])
    )
  }

  return (
    (+p[0])*60 +
    (+p[1])
  )
}

audio.ontimeupdate = ()=>{

  const t =
    audio.currentTime

  const cue =
    cues.find(c=>
      t >= c.start &&
      t < c.end + .25
    )

  subs.textContent =
    cue ? cue.text : ""
}

loadVTT()

/* background */

const bg =
  document.getElementById("bg")

const bgc =
  bg.getContext("2d")

let SW,SH

function resizeBG(){

  SW =
    bg.width =
      innerWidth

  SH =
    bg.height =
      innerHeight
}

resizeBG()

addEventListener(
  "resize",
  resizeBG
)

const particles = []

for(
  let i=0;
  i<420;
  i++
){

  particles.push({

    x:Math.random()*SW,
    y:Math.random()*SH,

    vx:
      (Math.random()-.5)*0.35,

    vy:
      (Math.random()-.5)*0.35,

    z:
      Math.random()*2
  })
}

function drawBG(){

  bgc.clearRect(
    0,0,SW,SH
  )

  for(const p of particles){

    p.x += p.vx
    p.y += p.vy

    if(p.x < 0) p.x = SW
    if(p.x > SW) p.x = 0

    if(p.y < 0) p.y = SH
    if(p.y > SH) p.y = 0

    bgc.fillStyle =
      `rgba(180,255,220,${
        .01 + p.z*.04
      })`

    bgc.fillRect(
      p.x,
      p.y,
      p.z*1.2,
      p.z*1.2
    )
  }
}

/* glitch */

setInterval(()=>{

  glitch.classList.add(
    "active"
  )

  setTimeout(()=>{

    glitch.classList.remove(
      "active"
    )

  },180)

},22000 + Math.random()*12000)

/* visualization */

const canvas =
  document.getElementById("viz")

const ctx =
  canvas.getContext("2d")

const size = 920

canvas.width  = size
canvas.height = size

const cx = size/2
const cy = size/2

let bassSmooth = 0
let midSmooth  = 0
let highSmooth = 0

let phase = 0
let frame = 0

function drawBubbleField(){

  if(analyser && data){

    analyser.getByteFrequencyData(data)

    let bass = 0
    let mid  = 0
    let high = 0

    for(let i=0;i<50;i++)
      bass += data[i]

    for(let i=50;i<220;i++)
      mid += data[i]

    for(let i=220;i<700;i++)
      high += data[i]

    bass /= 50 * 255
    mid  /= 170 * 255
    high /= 480 * 255

    bassSmooth +=
      (bass - bassSmooth) * 0.08

    midSmooth +=
      (mid - midSmooth) * 0.06

    highSmooth +=
      (high - highSmooth) * 0.05
  }

  phase +=
    0.01 +
    bassSmooth * 0.03

  ctx.save()

  ctx.beginPath()

  ctx.arc(
    cx,
    cy,
    size*0.47,
    0,
    Math.PI*2
  )

  ctx.clip()

  ctx.fillStyle =
    `rgba(0,5,0,${
      0.09 + bassSmooth*0.08
    })`

  ctx.fillRect(
    0,
    0,
    size,
    size
  )

  /* nested recursive rings */

  for(let i=0;i<34;i++){

    const r =
      size *
      (0.03 + i*0.012)

    ctx.beginPath()

    for(
      let a=0;
      a<=Math.PI*2+.02;
      a+=0.025
    ){

      const harmonic =
        Math.sin(
          a *
          (4 + i*0.3) +
          phase *
          (0.5 + i*0.018)
        ) *
        (4 + midSmooth*24)

      const recursive =
        Math.sin(
          a *
          (12 + i*0.55) -
          phase *
          (1.4 + i*0.02)
        ) *
        (2 + highSmooth*18)

      const x =
        cx +
        Math.cos(a) *
        (r + harmonic + recursive)

      const y =
        cy +
        Math.sin(a) *
        (r + harmonic - recursive*.35)

      if(a===0)
        ctx.moveTo(x,y)
      else
        ctx.lineTo(x,y)
    }

    ctx.strokeStyle =
      `rgba(120,255,180,${
        0.004 + i*0.007
      })`

    ctx.lineWidth =
      1 + i*0.01

    ctx.stroke()
  }

  /* bubble membranes */

  for(let i=0;i<18;i++){

    const orbit =
      frame*0.0012*(1+i*0.03)

    const rr =
      size *
      (0.08 + i*0.019)

    const bx =
      cx +
      Math.cos(orbit+i) *
      (i*8)

    const by =
      cy +
      Math.sin(orbit*1.3+i) *
      (i*6)

    const pulse =
      1 +
      bassSmooth*0.4 +
      Math.sin(frame*0.01+i)*0.08

    ctx.beginPath()

    ctx.arc(
      bx,
      by,
      rr*pulse,
      0,
      Math.PI*2
    )

    ctx.strokeStyle =
      `rgba(160,255,220,${
        0.012 + highSmooth*0.06
      })`

    ctx.lineWidth =
      1.2

    ctx.stroke()
  }

  /* central trace */

  ctx.save()

  ctx.translate(cx,cy)

  ctx.rotate(
    Math.sin(frame*0.0002)*0.4
  )

  const scale =
    size *
    (0.12 + bassSmooth*0.08)

  for(let pass=0; pass<5; pass++){

    ctx.beginPath()

    const alpha =
      pass===0 ? 0.02 :
      pass===1 ? 0.05 :
      pass===2 ? 0.12 :
      pass===3 ? 0.28 :
      0.92

    const spread =
      1 + pass*0.05

    for(let i=0;i<=3200;i++){

      const p =
        i / 3200

      const theta =
        phase +
        p * Math.PI * 8

      const fold =
        Math.sin(
          theta *
          (18 + highSmooth*40)
        ) *
        highSmooth * 28

      const x =
        Math.sin(
          theta *
          (3 + bassSmooth*2)
        ) *
        scale *
        spread +
        fold

      const y =
        Math.sin(
          theta *
          (4 + midSmooth*2)
        ) *
        scale *
        0.85 *
        spread

      if(i===0)
        ctx.moveTo(x,y)
      else
        ctx.lineTo(x,y)
    }

    ctx.strokeStyle =
      `rgba(120,255,180,${alpha})`

    ctx.lineWidth =
      pass===4
        ? 2 + bassSmooth*4
        : .8

    ctx.shadowBlur =
      pass===4
        ? 24 + bassSmooth*40
        : 0

    ctx.shadowColor =
      "#00ff88"

    ctx.stroke()
  }

  ctx.restore()

  ctx.restore()
}

function loop(){

  frame++

  drawBG()

  drawBubbleField()

  if(bassSmooth > .72){

    document.body.style.transform =

      `translate(${
        (Math.random()-.5)*4
      }px,${
        (Math.random()-.5)*4
      }px)`

  }else{

    document.body.style.transform =
      "translate(0,0)"
  }

  subs.style.transform =
    `scaleY(${1 + bassSmooth*0.04})`

  subs.style.opacity =
    `${0.72 + bassSmooth*0.28}`

  requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>
