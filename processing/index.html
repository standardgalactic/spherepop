<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Globally Persistent Recomposable Thought</title>

<style>
:root{
  --fg:#7cffc4;
  --bright:#00ff88;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:monospace;
  color:var(--fg);
  cursor:pointer;
}

body{
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CRT scanlines */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;

  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.045) 0px,
      rgba(255,255,255,0.045) 1px,
      transparent 2px,
      transparent 4px
    );

  opacity:.18;
  z-index:50;
}

/* digital noise */
body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;

  opacity:.07;
  z-index:51;

  mix-blend-mode:screen;

  background-image:
    repeating-radial-gradient(
      circle at 20% 30%,
      rgba(255,255,255,0.5) 0 1px,
      transparent 2px 5px
    ),
    repeating-radial-gradient(
      circle at 70% 60%,
      rgba(0,255,140,0.35) 0 1px,
      transparent 2px 6px
    );

  animation:noiseShift 0.18s infinite linear;
}

@keyframes noiseShift{
  0%{ transform:translate(0,0); }
  25%{ transform:translate(-2px,1px); }
  50%{ transform:translate(2px,-1px); }
  75%{ transform:translate(-1px,2px); }
  100%{ transform:translate(0,0); }
}

/* glitch */
body.glitch{
  animation:pageGlitch 0.22s linear;
  filter:contrast(1.3) brightness(1.15) saturate(1.2);
}

@keyframes pageGlitch{
  0%   { transform:translate(0,0) skewX(0deg); }
  15%  { transform:translate(-12px,4px) skewX(-2deg); }
  30%  { transform:translate(10px,-3px) skewX(1.5deg); }
  45%  { transform:translate(-6px,8px) skewX(-1deg); }
  60%  { transform:translate(7px,-4px) skewX(1deg); }
  75%  { transform:translate(-3px,2px) skewX(-0.5deg); }
  100% { transform:translate(0,0) skewX(0deg); }
}

/* artifacts */
#artifactLayer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:40;
  opacity:0;
}

#artifactLayer.active{
  opacity:1;
}

.artifact{
  position:absolute;
  background:rgba(0,255,120,0.12);
  border:1px solid rgba(0,255,140,0.3);
  mix-blend-mode:screen;
}

/* title */
.title{
  position:fixed;

  top:18px;
  left:50%;

  transform:translateX(-50%);

  width:min(94vw,760px);

  text-align:center;

  color:var(--bright);

  text-transform:uppercase;
  letter-spacing:0.16em;

  font-size:clamp(10px,2.6vw,13px);

  text-shadow:0 0 12px #00ff66;

  z-index:20;

  white-space:normal;
  line-height:1.4;
}

/* portal */
.portal{
  position:fixed;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;
}

canvas{
  width:min(520px,88vw);
  height:min(520px,88vw);

  border-radius:50%;

  background:
    radial-gradient(circle at center,
      rgba(0,25,15,0.95) 0%,
      rgba(0,8,6,0.98) 45%,
      #000 100%);

  border:2px solid rgba(0,255,120,0.28);

  box-shadow:
    inset 0 0 80px rgba(0,255,120,0.06),
    0 0 45px rgba(0,255,120,0.12);
}

/* subtitles */
#subs{
  position:fixed;

  bottom:42px;
  left:50%;

  transform:translateX(-50%);

  width:min(640px,92vw);

  min-height:2em;

  text-align:center;
  line-height:1.45;

  font-size:14px;

  padding:8px 12px;

  border-radius:6px;

  color:#d8ffe8;

  text-shadow:0 0 8px #00ff88;

  background:rgba(0,20,0,0.28);

  border:1px solid rgba(0,255,120,0.12);

  z-index:20;
}

/* essay link */
#essay{
  position:fixed;

  bottom:10px;
  left:50%;

  transform:translateX(-50%);

  width:min(92vw,720px);

  text-align:center;

  color:#7cffc4;

  opacity:0.72;

  text-decoration:none;

  font-size:12px;

  z-index:20;
}

#essay:hover{
  opacity:1;
}

/* startup overlay */
#overlay{
  position:fixed;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;

  background:#000;

  z-index:100;

  color:#00ff88;

  letter-spacing:0.15em;

  text-shadow:0 0 10px #00ff66;
}

#overlay.hidden{
  display:none;
}

#overlay span{
  animation:blink 1.2s step-start infinite;
}

@keyframes blink{
  50%{ opacity:0; }
}

</style>
</head>

<body>

<div id="overlay">
  <span>[ CLICK ANYWHERE TO START ]</span>
</div>

<div id="artifactLayer"></div>

<div class="title">
  Globally Persistent Recomposable Thought
</div>

<div class="portal">
  <canvas id="viz"></canvas>
</div>

<div id="subs"></div>

<a id="essay"
href="https://standardgalactic.github.io/spherepop/intelligence-explosion.pdf"
target="_blank">
Globally Persistent Recomposable Thought
</a>

<audio id="audio" preload="auto">
  <source src="GitHub_is_the_real_intelligence_explosion.mp3" type="audio/mpeg">
</audio>

<script>

const audio = document.getElementById("audio");
const canvas = document.getElementById("viz");
const g = canvas.getContext("2d");
const subs = document.getElementById("subs");
const overlay = document.getElementById("overlay");
const artifactLayer = document.getElementById("artifactLayer");

document.getElementById("essay").onclick =
e => e.stopPropagation();

/* canvas */
const DPR = window.devicePixelRatio || 1;

canvas.width = 460 * DPR;
canvas.height = 460 * DPR;

g.scale(DPR,DPR);

/* audio */
let ctxAudio;
let analyser;
let data;
let started = false;

function initAudio(){

  if(ctxAudio) return;

  ctxAudio =
    new (
      window.AudioContext ||
      window.webkitAudioContext
    )();

  analyser =
    ctxAudio.createAnalyser();

  analyser.fftSize = 2048;

  data =
    new Uint8Array(
      analyser.fftSize
    );

  const src =
    ctxAudio.createMediaElementSource(audio);

  src.connect(analyser);
  analyser.connect(ctxAudio.destination);
}

async function start(){

  if(started) return;

  started = true;

  overlay.classList.add("hidden");

  initAudio();

  if(ctxAudio.state === "suspended"){
    await ctxAudio.resume();
  }

  await audio.play();

  enableMotion();
}

document.body.addEventListener(
  "click",
  start,
  {once:true}
);

/* subtitles */

let cues = [];

async function loadVTT(file){

  try{

    const r = await fetch(file);

    if(!r.ok){
      throw new Error(file + " " + r.status);
    }

    const txt = await r.text();

    const blocks =
      txt.split(/\n{2,}/);

    for(const block of blocks){

      const lines =
        block.trim().split("\n");

      const ts =
        lines.find(
          l => l.includes("-->")
        );

      if(!ts) continue;

      const [s,e] =
        ts.split("-->")
          .map(x => x.trim());

      const text =
        lines
          .slice(lines.indexOf(ts)+1)
          .join(" ")
          .trim();

      cues.push({
        start:parseTime(s),
        end:parseTime(e),
        text
      });
    }

  }catch(err){

    console.warn(
      "VTT error:",
      err
    );
  }
}

function parseTime(t){

  const p =
    t.replace(",",".")
     .split(":");

  return p.length === 3
    ? +p[0]*3600 + +p[1]*60 + +p[2]
    : +p[0]*60 + +p[1];
}

audio.ontimeupdate = ()=>{

  const t =
    audio.currentTime;

  const cue =
    cues.find(c =>
      t >= c.start &&
      t < c.end + 0.2
    );

  subs.textContent =
    cue ? cue.text : "";
};

loadVTT(
  "GitHub_is_the_real_intelligence_explosion.vtt"
);

/* pointer tracking */

let targetX = 0;
let targetY = 0;

let offsetX = 0;
let offsetY = 0;

/* desktop mouse */

window.addEventListener(
  "mousemove",
  e=>{

    const nx =
      (e.clientX / innerWidth - 0.5);

    const ny =
      (e.clientY / innerHeight - 0.5);

    targetX = nx * 26;
    targetY = ny * 26;
  }
);

/* mobile tilt */

function enableMotion(){

  if(
    typeof DeviceOrientationEvent ===
    "undefined"
  ) return;

  /* iOS permission */

  if(
    typeof DeviceOrientationEvent.requestPermission ===
    "function"
  ){

    DeviceOrientationEvent
    .requestPermission()
    .then(state=>{

      if(state==="granted"){
        attachMotion();
      }
    })
    .catch(()=>{});

  }else{

    attachMotion();
  }
}

function attachMotion(){

  window.addEventListener(
    "deviceorientation",
    e=>{

      const gamma = e.gamma || 0;
      const beta  = e.beta  || 0;

      targetX =
        Math.max(
          -28,
          Math.min(28,gamma*0.8)
        );

      targetY =
        Math.max(
          -28,
          Math.min(28,(beta-45)*0.5)
        );
    }
  );
}

/* artifacts */

function spawnArtifacts(count=12){

  artifactLayer.innerHTML = "";

  for(let i=0;i<count;i++){

    const d =
      document.createElement("div");

    d.className = "artifact";

    const w =
      20 + Math.random()*180;

    const h =
      2 + Math.random()*20;

    d.style.width =
      w + "px";

    d.style.height =
      h + "px";

    d.style.left =
      Math.random()*window.innerWidth + "px";

    d.style.top =
      Math.random()*window.innerHeight + "px";

    if(Math.random() > 0.5){

      d.style.background =
        "rgba(255,255,255,0.08)";
    }

    artifactLayer.appendChild(d);
  }

  artifactLayer.classList.add("active");

  setTimeout(()=>{

    artifactLayer.classList.remove("active");

  },180);
}

function triggerGlitch(){

  document.body.classList.add("glitch");

  spawnArtifacts(
    8 + Math.floor(Math.random()*20)
  );

  setTimeout(()=>{

    document.body.classList.remove("glitch");

  },220);
}

/* draw */

let tick = 0;
let phase = 0;

let nextGlitch =
  performance.now() + 12000;

function draw(now){

  tick++;

  g.fillStyle =
    "rgba(0,4,0,0.08)";

  g.fillRect(0,0,460,460);

  const cx = 230;
  const cy = 230;
  const R  = 180;

  let energy = 0;

  if(analyser){

    analyser.getByteTimeDomainData(data);

    for(let i=0;i<data.length;i+=8){

      energy +=
        Math.abs(
          (data[i]-128)/128
        );
    }

    energy /= (data.length/8);
  }

  /* smooth tracking */

  offsetX +=
    (targetX-offsetX)*0.025;

  offsetY +=
    (targetY-offsetY)*0.025;

  /* glitch timing */

  if(now > nextGlitch){

    triggerGlitch();

    nextGlitch =
      now +
      8000 +
      Math.random()*18000 -
      energy*6000;
  }

  phase +=
    0.012 + energy*0.03;

  g.save();

  g.beginPath();

  g.arc(cx,cy,R,0,Math.PI*2);

  g.clip();

  /* grid */

  const gridShift =
    Math.sin(tick*0.0015)*20;

  g.strokeStyle =
    "rgba(0,255,120,0.04)";

  g.lineWidth = 1;

  for(let x=-460;x<920;x+=20){

    g.beginPath();

    g.moveTo(x+gridShift,-460);
    g.lineTo(x+gridShift,920);

    g.stroke();
  }

  for(let y=-460;y<920;y+=20){

    g.beginPath();

    g.moveTo(-460,y-gridShift);
    g.lineTo(920,y-gridShift);

    g.stroke();
  }

  /* shells */

  for(let i=1;i<=10;i++){

    g.beginPath();

    const rr =
      (R/10)*i +
      Math.sin(tick*0.004+i)*2;

    g.arc(cx,cy,rr,0,Math.PI*2);

    g.strokeStyle =
      `rgba(120,255,180,${
        0.01+i*0.008
      })`;

    g.lineWidth = 1;

    g.stroke();
  }

  if(analyser){

    const lag =
      Math.floor(
        data.length * (
          0.12 +
          Math.sin(tick*0.002)*0.04
        )
      );

    /* ghost */

    g.beginPath();

    for(let i=0;i<data.length;i++){

      const a =
        (data[i]-128)/128;

      const b =
        (data[
          (i+lag)%data.length
        ]-128)/128;

      const theta =
        (i/data.length)*Math.PI*2;

      const warp =
        1 +
        Math.sin(theta*6 + phase)*0.08 +
        Math.cos(theta*3 + phase*0.6)*0.04;

      const x =
        cx +
        offsetX +
        a * R * warp * 0.92;

      const y =
        cy +
        offsetY +
        b * R * warp * 0.82;

      if(i===0)
        g.moveTo(x,y);
      else
        g.lineTo(x,y);
    }

    g.strokeStyle =
      `rgba(120,255,180,${
        0.1+energy*0.25
      })`;

    g.lineWidth = 7;

    g.stroke();

    /* bright trace */

    g.beginPath();

    for(let i=0;i<data.length;i++){

      const a =
        (data[i]-128)/128;

      const b =
        (data[
          (i+lag)%data.length
        ]-128)/128;

      const theta =
        (i/data.length)*Math.PI*2;

      const warp =
        1 +
        Math.sin(theta*6 + phase)*0.08 +
        Math.cos(theta*3 + phase*0.6)*0.04;

      const x =
        cx +
        offsetX +
        a * R * warp * 0.92;

      const y =
        cy +
        offsetY +
        b * R * warp * 0.82;

      if(i===0)
        g.moveTo(x,y);
      else
        g.lineTo(x,y);
    }

    g.strokeStyle = "#7cffc4";

    g.lineWidth =
      1.3 + energy*1.8;

    g.shadowBlur =
      10 + energy*28;

    g.shadowColor =
      "#00ff88";

    g.stroke();

    g.shadowBlur = 0;
  }

  /* portal boundary */

  g.beginPath();

  g.arc(cx,cy,R,0,Math.PI*2);

  g.strokeStyle =
    "rgba(120,255,180,0.24)";

  g.lineWidth = 2;

  g.stroke();

  g.restore();

  requestAnimationFrame(draw);
}

draw(performance.now());

</script>

</body>
</html>
